<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>packUp 0.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#f7f5f2;--ink2:#eeeae4;--surface:#ffffff;--surface2:#f4f1ec;
  --rim:#e4dfd6;--rim2:#d4cec4;
  --cream:#2a2520;--cream2:#4a4540;--cream3:#8a8278;
  --gold:#b87800;--gold2:#d49010;--gold3:#f0b830;
  --accent-ski:#1a5fbb;--accent-sum:#c85800;--accent-win:#a86800;--accent-wkd:#2a6038;
  --r:20px;--r-sm:12px;
  --display:'Playfair Display',Georgia,serif;
  --body:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --sh-card:0 8px 40px rgba(0,0,0,.10);
  --sh-sm:0 2px 16px rgba(0,0,0,.07);
}
html{background:var(--ink);color:var(--cream)}
body{font-family:var(--body);background:var(--ink);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── LOADING ── */
.loading{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px}
.load-logo{font-family:var(--display);font-size:36px;color:var(--cream);letter-spacing:-.5px}
.load-logo span{color:var(--gold)}
.load-bar{width:160px;height:2px;background:var(--rim);border-radius:1px;overflow:hidden}
.load-fill{height:100%;background:var(--gold);border-radius:1px;animation:loadfill 1.4s ease-out forwards}
@keyframes loadfill{from{width:0}to{width:100%}}

/* ── PROFILE MODAL ── */
.modal-over{position:fixed;inset:0;background:rgba(42,37,32,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal{background:var(--surface);border:1px solid var(--rim);border-radius:24px;padding:32px 28px;width:100%;max-width:340px;box-shadow:0 24px 70px rgba(0,0,0,.13);text-align:center}
.modal-logo{font-family:var(--display);font-size:26px;color:var(--cream);margin-bottom:6px}
.modal-logo span{color:var(--gold)}
.modal h2{font-family:var(--display);font-size:17px;font-weight:400;color:var(--cream2);margin-bottom:20px;font-style:italic}
.av-ring{width:72px;height:72px;border-radius:50%;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:var(--ink);transition:background .25s,transform .2s;border:3px solid transparent}
.av-ring.has-name{transform:scale(1.05)}
.minput{width:100%;padding:13px 16px;border:1.5px solid var(--rim);border-radius:var(--r-sm);font-size:15px;font-family:var(--body);background:var(--ink2);color:var(--cream);outline:none;transition:border .2s;margin-bottom:16px;text-align:center;letter-spacing:.2px}
.minput:focus{border-color:var(--gold)}
.minput::placeholder{color:var(--cream3)}
.mbtn{width:100%;padding:14px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--body);letter-spacing:.3px;transition:background .2s,transform .15s}
.mbtn:hover{background:var(--gold2);transform:translateY(-1px)}
.mbtn:active{transform:translateY(0)}
.manage-toggle{margin-top:14px;background:none;border:none;color:var(--cream3);font-size:12px;cursor:pointer;font-family:var(--body);text-decoration:underline;padding:0}
.manage-panel{margin-top:14px;display:none}
.mu-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--rim)}
.mu-row:last-child{border-bottom:none}
.mu-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0}
.mu-name{flex:1;font-size:13px;color:var(--cream);text-align:left}
.mu-you{font-size:10px;color:var(--cream3);background:var(--rim2);padding:2px 7px;border-radius:8px}
.mu-del{width:24px;height:24px;border-radius:50%;border:1px solid #a32d2d;background:transparent;color:#e24b4a;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .2s}
.mu-del:hover{background:#a32d2d;color:#fff}

/* ── HEADER ── */
.header{background:rgba(247,245,242,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--rim);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.logo{font-family:var(--display);font-size:22px;color:var(--cream);cursor:pointer;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.logo span{color:var(--gold);font-style:italic}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;transition:background .3s}
.sync-dot.busy{background:var(--gold);animation:pulse .9s infinite}
.sync-dot.err{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.hright{display:flex;align-items:center;gap:8px}
.hbtn{background:var(--surface2);border:1px solid var(--rim);color:var(--cream2);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:var(--body);transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.hbtn:hover{background:var(--rim);color:var(--cream)}
.users-strip{display:flex;align-items:center;gap:5px;margin-right:4px}
.u-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 5px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;border:1.5px solid transparent;white-space:nowrap}
.u-pill:hover{border-color:var(--rim2);background:var(--surface2)}
.u-pill.me{border-color:var(--gold);background:rgba(184,120,0,.07)}
.u-pill-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.u-pill-name{color:var(--cream2);max-width:70px;overflow:hidden;text-overflow:ellipsis}
.u-pill.me .u-pill-name{color:var(--cream)}
.new-user-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px dashed var(--rim2);background:transparent;color:var(--cream3);font-family:var(--body);transition:all .18s;white-space:nowrap}
.new-user-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(184,120,0,.05)}

/* ── TOP NAV (replaces bottom tab bar) ── */
.topnav{display:flex;align-items:center;gap:2px}
.navbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:none;background:transparent;color:var(--cream3);cursor:pointer;font-family:var(--body);font-size:14px;font-weight:500;letter-spacing:.2px;border-radius:10px;transition:all .18s;-webkit-tap-highlight-color:transparent;white-space:nowrap;position:relative}
.navbtn:hover{background:var(--rim);color:var(--cream2)}
.navbtn.on{color:var(--cream);background:var(--surface2)}
.navbtn.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--gold);border-radius:1px}
.navbtn svg{flex-shrink:0;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}

.home{padding:16px 16px 24px;max-width:960px;margin:0 auto;min-height:calc(100vh - 55px);display:flex;flex-direction:column;justify-content:center}
.home-hero{margin-bottom:14px}
.home-eyebrow{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.home-hero h2{font-family:var(--display);font-size:26px;font-weight:700;color:var(--cream);line-height:1.15;margin-bottom:4px}
.home-hero p{font-size:13px;color:var(--cream3)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:540px){.grid{grid-template-columns:1fr}}

/* ── TRIP CARD ── */
.tcard{border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--sh-card);transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s;position:relative;-webkit-tap-highlight-color:transparent;border:1px solid var(--rim)}
.tcard:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.13)}
.tcard:active{transform:translateY(-1px)}
.ctop{padding:14px 12px 8px;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.ctop-bg{position:absolute;inset:0;z-index:0}
.ctop-grad{position:absolute;inset:0;z-index:1}
.cvan{max-width:130px;width:100%;display:block;position:relative;z-index:2;margin:0 auto}
.cbot{padding:11px 14px 13px;background:var(--surface);position:relative}
.cname{font-family:var(--display);font-size:16px;font-weight:700;color:var(--cream);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csub{font-size:12px;color:var(--cream3);margin-bottom:6px}
.cdur{font-family:var(--mono);font-size:11px;color:var(--cream3);margin-bottom:7px;display:flex;align-items:center;gap:4px}
.cdur-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);display:inline-block}
.cprog-wrap{margin-bottom:5px}
.cpct-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cpct-num{font-family:var(--display);font-size:20px;font-weight:700;line-height:1}
.cpct-sub{font-family:var(--mono);font-size:11px;color:var(--cream3)}
.cprog{height:10px;background:var(--rim2);border-radius:5px;overflow:hidden}
.cpfill{height:100%;border-radius:5px;transition:width .5s ease}
.cgauges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}

/* ── TRIP DETAIL VIEW ── */
.trip{display:none;max-width:680px;margin:0 auto;padding:0 0 30px}
.trip.on{display:block}
.thero{padding:20px 16px 6px;text-align:center}
.thero h1{font-family:var(--display);font-size:22px;font-weight:700;color:var(--cream);margin-bottom:2px}
.thero .tsub{font-size:12px;color:var(--cream3);margin-bottom:10px}
.hvan{max-width:180px;margin:0 auto 10px;display:block}

/* CARDS inside trip */
.dcard{margin:0 14px 12px;background:var(--surface);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh-sm);border:1px solid var(--rim)}
.dur-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.dur-label{font-size:13px;font-weight:600;color:var(--cream);display:flex;align-items:center;gap:6px}
.dur-ctrl{display:flex;align-items:center;gap:12px}
.durbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:700;padding:0;line-height:1}
.durbtn:hover{background:var(--gold);color:var(--ink)}
.durval{font-family:var(--display);font-size:22px;font-weight:700;color:var(--gold);min-width:26px;text-align:center}
.dur-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--rim)}
.dur-pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--rim2);border-radius:20px;padding:4px 11px;font-size:11px}
.dur-pill .dp-name{color:var(--cream3)}
.dur-pill .dp-qty{font-weight:700;color:var(--gold);font-family:var(--mono)}

/* My progress */
.prog-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.prog-label{font-size:12px;font-weight:600;color:var(--cream3);letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
.prog-pct{font-family:var(--display);font-size:54px;font-weight:700;line-height:1}
.prog-bar{height:12px;background:var(--rim2);border-radius:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-sub{margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--cream3)}

/* Team */
.uc-title{font-size:12px;font-weight:600;color:var(--cream3);letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);margin-bottom:14px}
.uc-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.uc-row:last-child{margin-bottom:0}
.u-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ink);flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-name{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.u-you{font-size:9px;color:var(--gold);background:rgba(184,120,0,.1);border:1px solid rgba(184,120,0,.25);padding:1px 6px;border-radius:8px;font-family:var(--mono)}
.u-pbar{height:10px;background:var(--rim2);border-radius:5px;overflow:hidden}
.u-pfill{height:100%;border-radius:5px;transition:width .6s ease}
.u-pct{font-family:var(--display);font-size:17px;font-weight:700;min-width:44px;text-align:right;flex-shrink:0}
.u-del{width:28px;height:28px;border-radius:50%;border:1px solid #a32d2d;background:transparent;color:#e24b4a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;transition:all .2s}
.u-del:hover{background:#a32d2d;color:#fff}

/* Categories */
.cats{margin:0 14px 10px}
.cath{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;user-select:none;padding:2px 0}
.caticon{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.caticon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;color:var(--cream3)}
.catname{font-size:13px;font-weight:600;color:var(--cream);flex:1}
.catcount{font-family:var(--mono);font-size:10px;color:var(--cream3);background:var(--surface2);border:1px solid var(--rim);padding:2px 8px;border-radius:10px}
.catchev{font-size:10px;color:var(--cream3);transition:transform .2s}
.cats.coll .catchev{transform:rotate(-90deg)}
.cats.coll .ilist{display:none}
.ilist{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm);border:1px solid var(--rim)}
.item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--rim);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.item:last-child{border-bottom:none}
.item:hover{background:var(--ink2)}
.item.done{opacity:.48}
.chk{width:22px;height:22px;border:2px solid var(--rim2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.item.done .chk{background:var(--gold);border-color:var(--gold)}
.chk::after{content:'';width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) scale(0);transition:transform .18s;margin-top:-2px}
.item.done .chk::after{transform:rotate(45deg) scale(1)}
.itxt{flex:1;font-size:13px;color:var(--cream);line-height:1.3}
.item.done .itxt{text-decoration:line-through;color:var(--cream3)}
.iqty{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:9px;white-space:nowrap;flex-shrink:0}
.iqty.fixed{background:var(--surface2);color:var(--cream3);border:1px solid var(--rim)}
.iqty.daily{background:rgba(200,146,10,.18);color:var(--gold);font-weight:600;border:1px solid rgba(200,146,10,.3)}
.iqty .iq-rule{font-weight:400;opacity:.7;font-size:9px}
.idel{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--rim2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;flex-shrink:0}
.idel:hover{background:rgba(226,75,74,.2);color:#e24b4a}
.item-dots{display:flex;gap:2px;margin-left:2px}
.ic-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--surface);flex-shrink:0;opacity:.9}

/* Add item */
.addsec{margin:0 14px 12px;background:var(--surface);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh-sm);border:1px dashed var(--rim2)}
.addtitle{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.addrow{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.ainput{flex:1;min-width:110px;padding:9px 13px;border:1px solid var(--rim2);border-radius:var(--r-sm);font-size:13px;font-family:var(--body);background:var(--ink2);color:var(--cream);outline:none;transition:border .2s}
.ainput:focus{border-color:var(--gold)}
.ainput::placeholder{color:var(--cream3)}
.aselect{padding:9px 11px;border:1px solid var(--rim2);border-radius:var(--r-sm);font-size:12px;font-family:var(--body);background:var(--ink2);color:var(--cream);outline:none;cursor:pointer}
.abtn{padding:9px 16px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--body);white-space:nowrap;transition:opacity .2s}
.abtn:hover{opacity:.85}
.permrow{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--cream3);cursor:pointer;user-select:none}
.permrow input{accent-color:var(--gold);cursor:pointer;width:13px;height:13px}
.resetbtn{display:block;margin:8px auto 0;padding:7px 18px;background:transparent;border:1px solid var(--rim2);border-radius:20px;color:var(--cream3);font-size:11px;cursor:pointer;font-family:var(--body);transition:all .2s}
.resetbtn:hover{border-color:#a32d2d;color:#e24b4a}

/* ── LINKS VIEW ── */
.links-view{display:none;padding:16px 16px 32px;max-width:798px;margin:0 auto}
.links-view.on{display:block}
.sec-eyebrow{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;margin-top:20px;display:block}
.sec-eyebrow:first-child{margin-top:0}
.sec-title{font-family:var(--display);font-size:20px;font-weight:700;color:var(--cream);margin-bottom:12px}
.link-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
@media(max-width:420px){.link-grid{grid-template-columns:1fr}}
.lcard{background:var(--surface);border:1px solid var(--rim);border-radius:var(--r);padding:16px 14px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;gap:6px;box-shadow:var(--sh-sm);transition:transform .18s,border-color .18s,box-shadow .18s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(184,120,0,.04) 0%,transparent 60%);pointer-events:none}
.lcard:hover{transform:translateY(-3px);border-color:var(--rim2);box-shadow:0 8px 28px rgba(0,0,0,.10)}
.lc-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;color:var(--cream2)}
.lc-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
.lc-name{font-size:14px;font-weight:700;color:var(--cream)}
.lc-desc{font-size:11px;color:var(--cream3);line-height:1.45}
.lc-badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 9px;border-radius:12px;border:1px solid var(--rim2);color:var(--cream3);background:var(--surface2);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;width:fit-content}
.lc-arrow{position:absolute;top:14px;right:14px;color:var(--rim2);font-size:13px;transition:color .18s,transform .18s}
.lcard:hover .lc-arrow{color:var(--gold);transform:translate(2px,-2px)}

/* ── CAR VIEW ── */
.car-view{display:none;padding:16px 16px 32px;max-width:680px;margin:0 auto}
.car-view.on{display:block}
.car-search-box{background:var(--surface);border-radius:var(--r);padding:18px;border:1px solid var(--rim);box-shadow:var(--sh-sm);margin-bottom:16px;position:relative;overflow:hidden}
.car-search-box::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(184,120,0,.08),transparent 70%);pointer-events:none}
.car-stitle{font-size:13px;font-weight:700;color:var(--cream);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.car-stitle-mono{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.car-row{display:flex;gap:8px}
.car-inp{flex:1;padding:11px 14px;border:1px solid var(--rim2);border-radius:var(--r-sm);font-size:14px;font-family:var(--body);background:var(--ink2);color:var(--cream);outline:none;transition:border .2s}
.car-inp:focus{border-color:var(--gold)}
.car-inp::placeholder{color:var(--cream3)}
.car-sbtn{padding:11px 16px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.car-sbtn:hover{opacity:.85}
.car-links{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.car-link{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--surface2);border:1px solid var(--rim2);border-radius:20px;font-size:12px;font-weight:500;color:var(--cream2);text-decoration:none;transition:all .15s}
.car-link:hover{background:var(--rim2);border-color:var(--gold);color:var(--gold)}
.cl-box{background:var(--surface);border-radius:var(--r);border:1px solid var(--rim);overflow:hidden;box-shadow:var(--sh-sm);margin-bottom:14px}
.cl-head{padding:14px 16px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;border-bottom:1px solid var(--rim)}
.cl-htitle{font-size:14px;font-weight:700;color:var(--cream);flex:1}
.cl-pct{font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:600}
.cl-progwrap{padding:10px 16px 0}
.cl-prog{height:8px;background:var(--rim2);border-radius:4px;overflow:hidden;margin-bottom:10px}
.cl-pfill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--gold)}
.cl-item{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid var(--rim);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.cl-item:last-child{border-bottom:none}
.cl-item:hover{background:var(--surface2)}
.cl-item.done{opacity:.45}
.cl-chk{width:22px;height:22px;border:2px solid var(--rim2);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cl-item.done .cl-chk{background:var(--gold);border-color:var(--gold)}
.cl-chk::after{content:'';width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) scale(0);transition:transform .18s;margin-top:-2px}
.cl-item.done .cl-chk::after{transform:rotate(45deg) scale(1)}
.cl-txt{flex:1;font-size:13px;color:var(--cream);line-height:1.35}
.cl-item.done .cl-txt{text-decoration:line-through;color:var(--cream3)}
.cl-sub{font-size:11px;color:var(--cream3);display:block;margin-top:2px;line-height:1.4}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--cream);border:1px solid var(--rim2);color:var(--ink);padding:9px 20px;border-radius:24px;font-size:13px;z-index:500;transition:transform .3s ease,opacity .3s;white-space:nowrap;pointer-events:none;opacity:0;box-shadow:var(--sh-sm)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── UTILS ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:2px}

function syncDot(s){ const d=document.getElementById('syncDot'); if(!d)return; d.className='sync-dot'+(s==='busy'?' busy':s==='err'?' err':''); }

// ── STORAGE ────────────────────────────────────────────────────────────
async function sGet(key){
  try{
    if(key==='profiles'){ const{data,error}=await db.from('profiles').select('*'); if(error)throw error; return data||[]; }
    if(key.startsWith('trip-')){ const id=key.slice(5); const{data,error}=await db.from('trip_settings').select('*').eq('trip_id',id).single(); if(error&&error.code!=='PGRST116')throw error; return data||null; }
    if(key.startsWith('checked-')){ const parts=key.split('-'); const pid=parts[parts.length-1]; const tid=parts.slice(1,-1).join('-'); const{data,error}=await db.from('checked_items').select('item_id').eq('trip_id',tid).eq('profile_id',pid); if(error)throw error; return data?data.map(r=>r.item_id):[]; }
    const v=localStorage.getItem('pu:'+key); return v?JSON.parse(v):null;
  }catch(e){ console.warn('[pU] sGet',key,e.message); syncDot('err'); return null; }
}
async function sSet(key,val){
  try{
    if(key==='profiles'){ for(const p of val){ const{error}=await db.from('profiles').upsert({id:p.id,name:p.name,color_hex:p.color},{onConflict:'id'}); if(error)throw error; } return; }
    if(key.startsWith('trip-')){ const tid=key.slice(5); const{error}=await db.from('trip_settings').upsert({trip_id:tid,duration:val.duration},{onConflict:'trip_id'}); if(error)throw error; return; }
    if(key.startsWith('checked-')){ const parts=key.split('-'); const pid=parts[parts.length-1]; const tid=parts.slice(1,-1).join('-'); const{error:de}=await db.from('checked_items').delete().eq('profile_id',pid).eq('trip_id',tid); if(de)throw de; if(val&&val.length){ const rows=val.map(id=>({profile_id:pid,trip_id:tid,item_id:id,item_type:'catalogue'})); const{error:ie}=await db.from('checked_items').insert(rows); if(ie)throw ie; } return; }
    localStorage.setItem('pu:'+key,JSON.stringify(val));
  }catch(e){ console.warn('[pU] sSet',key,e.message); syncDot('err'); }
}

// ── QUANTITY RULES ────────────────────────────────────────────────────

function calcQ(rule,d){return(QRULES[rule]||QRULES.fixed)(d);}
function resolveQ(q,dur){if(typeof q==='number')return{qty:q,rule:'fixed'};const rule=QRULES[q]?q:'fixed';return{qty:calcQ(rule,dur),rule};}

const ti=id=>(T[lang].items||{})[id]||id;
const tc=id=>(T[lang].cats||{})[id]||id;
function showToast(msg,ms=2100){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),ms);}
function allItemsList(id,st){const tr=TRIPS[id],d=st.duration,arr=[];for(const c of tr.cats)for(const i of c.items){const{qty,rule}=resolveQ(i.q,d);arr.push({id:i.id,catId:c.id,qty,rule});}for(const ci of(st.customItems||[]))arr.push({id:ci.id,catId:ci.catId,qty:1,rule:'fixed',custom:true,name:ci.name,permanent:ci.permanent});return arr;}
function calcProg(tid,st,chk){const all=allItemsList(tid,st),s=new Set(chk);return{done:all.filter(i=>s.has(i.id)).length,total:all.length};}
function durPills(tid,dur){return TRIPS[tid].cats.flatMap(c=>c.items.filter(i=>typeof i.q==='string'&&i.q!=='fixed').map(i=>({id:i.id,qty:calcQ(i.q,dur),rule:i.q})));}

// ── HALF-CIRCLE GAUGE SVG ─────────────────────────────────────────────
function halfGauge(color,pct,label){
  const arc=113.1;
  const fill=(pct/100*arc).toFixed(1);
  return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:4px">
    <svg width="76" height="46" viewBox="0 0 76 46" style="overflow:visible">
      <path d="M6,42 A32,32 0 0,1 70,42" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="11" stroke-linecap="round"/>
      <path d="M6,42 A32,32 0 0,1 70,42" fill="none" stroke="${color}" stroke-width="11" stroke-linecap="round"
        stroke-dasharray="${(pct/100*100.5).toFixed(1)} 100.5" style="transition:stroke-dasharray .6s ease"/>
      <text x="38" y="36" text-anchor="middle" font-size="12" font-weight="700" fill="${color}" font-family="DM Mono,monospace">${label}</text>
    </svg>
    <span style="font-size:13px;font-weight:700;color:${color};font-family:var(--display);line-height:1">${pct}%</span>
  </div>`;
}

function showProfileModal(editing=false){
  // editing=true → edit current profile; editing=false → always blank (new user)
  const isEdit=editing&&!!myProfile;
  document.getElementById('mTitle').textContent=isEdit?t('pEdit'):t('pTitle');
  document.getElementById('mSaveBtn').textContent=t('pSave');
  document.getElementById('pName').placeholder=t('pPh');
  const r=document.getElementById('avRing');
  if(isEdit){
    document.getElementById('pName').value=myProfile.name;
    r.style.background=myProfile.color;r.style.borderColor=myProfile.color;
    r.textContent=ini(myProfile.name);r.classList.add('has-name');
  } else {
    document.getElementById('pName').value='';
    r.style.background='var(--rim2)';r.style.borderColor='var(--rim2)';
    r.textContent='?';r.classList.remove('has-name');
  }
  document.getElementById('profileModal').style.display='flex';
  setTimeout(()=>document.getElementById('pName').focus(),140);
}
async function saveProfile(){
  const name=(document.getElementById('pName').value||'').trim();
  if(!name){document.getElementById('pName').focus();return;}
  const color=colorFromName(name);
  // If current user exists and name matches, edit them. Otherwise always create new.
  const isEdit=myProfile&&myProfile.name===name;
  if(!myProfile||!isEdit){
    // New user — but don't duplicate if same name already exists
    const existing=allProfiles.find(p=>p.name.trim().toLowerCase()===name.toLowerCase());
    if(existing){
      // Just switch to that user
      myProfile={...existing};
    } else {
      myProfile={id:'u'+Date.now()+Math.random().toString(36).slice(2,6),name,color};
    }
  } else {
    myProfile.name=name;myProfile.color=color;
  }
  myProfile.color=colorFromName(myProfile.name);
  localStorage.setItem('pu-me',JSON.stringify(myProfile));
  const idx=allProfiles.findIndex(p=>p.id===myProfile.id);
  if(idx>=0)allProfiles[idx]={...myProfile};else allProfiles.push({...myProfile});
  syncDot('busy');await sSet('profiles',allProfiles);syncDot('ok');
  document.getElementById('profileModal').style.display='none';
  updateProfBtn();
  document.getElementById('homeView').style.display='block';
  if(currentTrip)renderTrip(currentTrip);else switchTab('trips');
}
function updateProfBtn(){
  const strip = document.getElementById('usersStrip');
  if (!strip) return;
  strip.innerHTML = allProfiles.map(pr => {
    const isMe = myProfile && pr.id === myProfile.id;
    return `<div class="u-pill${isMe?' me':''}" onclick="showProfileModal(true)" title="${isMe?'Edit your profile':''}">
      <div class="u-pill-av" style="background:${pr.color}">${ini(pr.name)}</div>
      <span class="u-pill-name">${pr.name}</span>
    </div>`;
  }).join('');
}
function toggleManage(){
  const p=document.getElementById('managePanel'),b=document.getElementById('manageToggle');
  const open=p.style.display==='none'||!p.style.display;
  p.style.display=open?'block':'none';b.textContent=open?'hide':'manage users';
  if(open)renderUserList();
}
function renderUserList(){
  const el=document.getElementById('userList');if(!el)return;
  el.innerHTML=allProfiles.map(pr=>{
    const isMe=myProfile&&pr.id===myProfile.id;
    return`<div class="mu-row"><div class="mu-av" style="background:${pr.color}">${ini(pr.name)}</div><div class="mu-name">${pr.name}${isMe?`<span class="mu-you">you</span>`:''}</div>${isMe?'<div style="width:24px"></div>':`<button class="mu-del" onclick="deleteProfile('${pr.id}')">×</button>`}</div>`;
  }).join('');
}
async function deleteProfile(id){
  const pr=allProfiles.find(p=>p.id===id);if(!pr)return;
  if(!confirm(`Remove "${pr.name}" from all trips?`))return;
  syncDot('busy');
  try{
    const{error:e1}=await db.from('checked_items').delete().eq('profile_id',id);if(e1)throw e1;
    const{error:e2}=await db.from('profiles').delete().eq('id',id);if(e2)throw e2;
    allProfiles=allProfiles.filter(p=>p.id!==id);
    IDS.forEach(tid=>{delete userChecked['_u'+id+'_'+tid];});
    syncDot('ok');showToast('✓ '+pr.name+' removed');renderUserList();
    if(currentTrip)renderTrip(currentTrip);else renderHome();
  }catch(e){console.error(e.message);syncDot('err');showToast('Error removing user');}
}

// ── RENDER TRIP ───────────────────────────────────────────────────────
function renderTrip(tripId){
  const st=tripStates[tripId]||defState(tripId);
  const trip=TRIPS[tripId];
  const myChk=new Set(userChecked[tripId]||[]);
  const dur=st.duration;
  const p=calcProg(tripId,st,[...myChk]);
  const pct=p.total?Math.round(p.done/p.total*100):0;
  const tNames={ski:t('tripSki'),summer:t('tripSummer'),winter:t('tripWinter'),weekend:t('tripWeekend')};
  const tSubs={ski:t('subSki'),summer:t('subSummer'),winter:t('subWinter'),weekend:t('subWeekend')};
  const catOpts=trip.cats.map(c=>`<option value="${c.id}">${tc(c.id)}</option>`).join('');
  const acc=CARD_ACCENTS[tripId];
  const myCol=myProfile?myProfile.color:acc;
  const others=allProfiles.filter(pr=>!myProfile||pr.id!==myProfile.id);
  const pills=durPills(tripId,dur);
  const pillsHTML=pills.map(pi=>`<div class="dur-pill"><span class="dp-name">${ti(pi.id)}</span><span class="dp-qty">×${pi.qty}</span></div>`).join('');
  let teamHTML='';
  for(const pr of allProfiles){
    const ch=userChecked['_u'+pr.id+'_'+tripId]||[];
    const up=calcProg(tripId,st,ch);
    const upct=up.total?Math.round(up.done/up.total*100):0;
    const isMe=myProfile&&pr.id===myProfile.id;
    teamHTML+=`<div class="uc-row">
      <div class="u-av" style="background:${pr.color}">${ini(pr.name)}</div>
      <div class="u-info">
        <div class="u-name">${pr.name}${isMe?`<span class="u-you">${t('you')}</span>`:''}</div>
        <div class="u-pbar"><div class="u-pfill" style="width:${upct}%;background:${pr.color}"></div></div>
      </div>
      <div class="u-pct" style="color:${pr.color}">${upct}%</div>
      ${!isMe?`<button class="u-del" onclick="deleteProfile('${pr.id}')">×</button>`:'<div style="width:28px"></div>'}
    </div>`;
  }
  let catsHTML='';
  for(const cat of trip.cats){
    const cH=cat.items.map(item=>{
      const{qty,rule}=resolveQ(item.q,dur);
      const done=myChk.has(item.id);
      const isD=rule!=='fixed';
      let badge='';
      if(isD){const rt=rule==='daily'?t('perDay'):rule==='halfday'?'1/2d':rule==='sweaters'?'1/3d':'~';badge=`<span class="iqty daily">×${qty} <span class="iq-rule">(${rt})</span></span>`;}
      else if(typeof item.q==='number'&&item.q>1){badge=`<span class="iqty fixed">×${qty}</span>`;}
      const dots=others.filter(pr=>(userChecked['_u'+pr.id+'_'+tripId]||[]).includes(item.id)).map(pr=>`<div class="ic-dot" style="background:${pr.color}" title="${pr.name}"></div>`).join('');
      return`<div class="item${done?' done':''}" data-id="${item.id}" onclick="toggleItem('${tripId}','${item.id}')"><div class="chk"></div><div class="itxt">${ti(item.id)}</div>${badge}${dots?`<div class="item-dots">${dots}</div>`:''}</div>`;
    }).join('');
    const custH=(st.customItems||[]).filter(ci=>ci.catId===cat.id).map(ci=>{
      const done=myChk.has(ci.id);
      const dots=others.filter(pr=>(userChecked['_u'+pr.id+'_'+tripId]||[]).includes(ci.id)).map(pr=>`<div class="ic-dot" style="background:${pr.color}"></div>`).join('');
      return`<div class="item${done?' done':''}" data-id="${ci.id}" onclick="toggleItem('${tripId}','${ci.id}')"><div class="chk"></div><div class="itxt">${ci.name}${ci.permanent?'':' ✦'}</div>${dots?`<div class="item-dots">${dots}</div>`:''}<button class="idel" onclick="event.stopPropagation();delItem('${tripId}','${ci.id}')">×</button></div>`;
    }).join('');
    const total=cat.items.length+(st.customItems||[]).filter(ci=>ci.catId===cat.id).length;
    const done2=cat.items.filter(i=>myChk.has(i.id)).length+(st.customItems||[]).filter(ci=>ci.catId===cat.id&&myChk.has(ci.id)).length;
    catsHTML+=`<div class="cats" id="cat-${tripId}-${cat.id}">
      <div class="cath" onclick="togCat('${tripId}','${cat.id}')">
        <span class="caticon">${si(cat.icon)}</span><span class="catname">${tc(cat.id)}</span>
        <span class="catcount">${done2}/${total}</span><span class="catchev">▾</span>
      </div>
      <div class="ilist">${cH}${custH}</div>
    </div>`;
  }
  document.getElementById('tripView').innerHTML=`
    <div class="thero">
      <div class="hvan">${SVGS[tripId]}</div>
      <h1>${tNames[tripId]}</h1>
      <p class="tsub">${tSubs[tripId]}</p>
    </div>
    <div class="dcard">
      <div class="dur-row">
        <span class="dur-label">🗓 ${t('duration')}</span>
        <div class="dur-ctrl">
          <button class="durbtn" onclick="chDur('${tripId}',-1)">−</button>
          <span class="durval" id="durVal">${dur}</span>
          <button class="durbtn" onclick="chDur('${tripId}',1)">+</button>
          <span style="font-size:12px;color:var(--cream3)">${t('days')}</span>
        </div>
      </div>
      ${pillsHTML?`<div class="dur-pills">${pillsHTML}</div>`:''}
    </div>
    <div class="dcard">
      <div class="prog-hdr">
        <div><div class="prog-label">${t('progress')}</div><div class="prog-pct" id="progPct" style="color:${myCol}">${pct}%</div></div>
        <div style="text-align:right"><div class="prog-label">&nbsp;</div><div style="font-family:var(--mono);font-size:12px;color:var(--cream3);margin-top:6px">${p.done} ${t('of')} ${p.total}</div></div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:${pct}%;background:${myCol}"></div></div>
      <div class="prog-sub" id="progSub">${p.done} ${t('of')} ${p.total} ${t('packed')}</div>
    </div>
    ${allProfiles.length>1?`<div class="dcard"><div class="uc-title">${t('teamProg')}</div>${teamHTML}</div>`:''}
    ${catsHTML}
    <div class="addsec">
      <div class="addtitle">+ ${t('addItem')}</div>
      <div class="addrow">
        <input class="ainput" id="newN" placeholder="${t('addName')}" maxlength="60" onkeydown="if(event.key==='Enter')addItem('${tripId}')"/>
        <select class="aselect" id="newC">${catOpts}</select>
      </div>
      <div class="addrow">
        <label class="permrow"><input type="checkbox" id="newP" checked/>${t('addPerm')}</label>
        <button class="abtn" onclick="addItem('${tripId}')">${t('addBtn')}</button>
      </div>
    </div>
    <button class="resetbtn" onclick="doReset('${tripId}')">${t('reset')}</button>
    <div style="height:24px"></div>`;
}
function updProg(tid){
  const st=tripStates[tid];if(!st)return;
  const p=calcProg(tid,st,userChecked[tid]||[]);
  const pct=p.total?Math.round(p.done/p.total*100):0;
  const pf=document.getElementById('progFill'),pp=document.getElementById('progPct'),ps=document.getElementById('progSub');
  if(pf)pf.style.width=pct+'%';if(pp)pp.textContent=pct+'%';
  if(ps)ps.textContent=`${p.done} ${t('of')} ${p.total} ${t('packed')}`;
}

let dogChecked=JSON.parse(localStorage.getItem('pu-dog')||'{}');
function renderDog(){
  const el=document.getElementById('dogView');
  const lists=DOG_LISTS[lang]||DOG_LISTS.en;
  const links=DOG_LINKS[lang]||DOG_LINKS.en;
  const heading=lang==='sv'?'Resa med hund':'Travelling with your dog';
  const linksHead=lang==='sv'?'Användbara länkar':'Useful links';
  const listsHTML=lists.map(lst=>{
    const done=lst.items.filter(i=>dogChecked[lst.id+'-'+i.id]).length;
    const pct=Math.round(done/lst.items.length*100);
    const rows=lst.items.map(i=>{const k=lst.id+'-'+i.id;const isDone=!!dogChecked[k];
      return`<div class="cl-item${isDone?' done':''}" onclick="toggleDog('${k}')"><div class="cl-chk"></div><div class="cl-txt">${i.label}<span class="cl-sub">${i.sub}</span></div></div>`;}).join('');
    const iconKey = lst.id==='pre'?'car':lst.id==='kids'?'bag':lst.id==='dog-pack'?'bag':lst.id==='dog-admin'?'clipboard':lst.id==='dog-tips'?'car':'other';
    return`<div class="cl-box"><div class="cl-head">${si(iconKey,14)}<span class="cl-htitle" style="margin-left:6px">${lst.title}</span><span class="cl-pct">${done}/${lst.items.length} · ${pct}%</span></div><div class="cl-progwrap"><div class="cl-prog"><div class="cl-pfill" style="width:${pct}%"></div></div></div>${rows}</div>`;
  }).join('');
  const linksHTML=`<div class="link-grid" style="margin-bottom:14px">${links.map(lk=>`<a class="lcard" href="${lk.url}" target="_blank" rel="noopener"><span class="lc-arrow">↗</span><div class="lc-icon">${si(lk.icon,20)}</div><div class="lc-name">${lk.name}</div><div class="lc-desc">${lk.desc}</div></a>`).join('')}</div>`;
  el.innerHTML=`<span class="sec-eyebrow" style="margin-top:0">Road trip companion</span><div class="sec-title">🐶 ${heading}</div>${listsHTML}<span class="sec-eyebrow">${linksHead}</span>${linksHTML}<button class="resetbtn" onclick="resetDog()">${lang==='sv'?'Återställ hundchecklistorna':'Reset dog checklists'}</button><div style="height:12px"></div>`;
}
function toggleDog(key){dogChecked[key]=!dogChecked[key];localStorage.setItem('pu-dog',JSON.stringify(dogChecked));renderDog();}
function resetDog(){if(!confirm(lang==='sv'?'Återställa hundchecklistorna?':'Reset dog checklists?'))return;dogChecked={};localStorage.setItem('pu-dog','{}');renderDog();showToast('✓ Reset');}

// ── ACTIONS ───────────────────────────────────────────────────────────
async function toggleItem(tid,iid){
  if(!myProfile){showProfileModal();return;}
  const arr=userChecked[tid]||(userChecked[tid]=[]);
  const idx=arr.indexOf(iid);if(idx>=0)arr.splice(idx,1);else arr.push(iid);
  userChecked['_u'+myProfile.id+'_'+tid]=arr;
  const el=document.querySelector(`[data-id="${iid}"]`);
  if(el)el.classList.toggle('done',arr.includes(iid));
  updProg(tid);syncDot('busy');
  await sSet('checked-'+tid+'-'+myProfile.id,arr);syncDot('ok');
}
async function chDur(tid,d){
  const st=tripStates[tid]||defState(tid);
  st.duration=Math.max(1,Math.min(60,(st.duration||TRIPS[tid].defaultDuration)+d));
  tripStates[tid]=st;syncDot('busy');await sSet('trip-'+tid,st);syncDot('ok');renderTrip(tid);
}
async function addItem(tid){
  const n=(document.getElementById('newN').value||'').trim();if(!n){document.getElementById('newN').focus();return;}
  const st=tripStates[tid]||defState(tid);st.customItems=st.customItems||[];
  const id='c'+Date.now();
  st.customItems.push({id,name:n,catId:document.getElementById('newC').value,permanent:document.getElementById('newP').checked});
  tripStates[tid]=st;syncDot('busy');await sSet('trip-'+tid,st);syncDot('ok');
  document.getElementById('newN').value='';renderTrip(tid);showToast('✓ '+n);
}
async function delItem(tid,iid){
  const st=tripStates[tid];if(!st)return;
  st.customItems=(st.customItems||[]).filter(ci=>ci.id!==iid);
  userChecked[tid]=(userChecked[tid]||[]).filter(id=>id!==iid);
  syncDot('busy');await sSet('trip-'+tid,st);
  if(myProfile)await sSet('checked-'+tid+'-'+myProfile.id,userChecked[tid]);
  syncDot('ok');renderTrip(tid);
}
async function doReset(tid){
  if(!myProfile||!confirm(t('resetConfirm')))return;
  userChecked[tid]=[];userChecked['_u'+myProfile.id+'_'+tid]=[];
  const st=tripStates[tid];if(st)st.customItems=(st.customItems||[]).filter(ci=>ci.permanent);
  syncDot('busy');await sSet('checked-'+tid+'-'+myProfile.id,[]);if(st)await sSet('trip-'+tid,st);syncDot('ok');
  renderTrip(tid);showToast('✓ Reset');
}
function togCat(tid,cid){const el=document.getElementById(`cat-${tid}-${cid}`);if(el)el.classList.toggle('coll');}

// ── NAV ───────────────────────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  document.getElementById('homeView').style.display='none';
  document.getElementById('linksView').classList.remove('on');
  document.getElementById('carView').classList.remove('on');
  document.getElementById('dogView').classList.remove('on');
  document.getElementById('tripView').style.display='none';
  document.getElementById('tripView').classList.remove('on');
  document.getElementById('backBtn').style.display='none';
  document.getElementById('topnav').style.display='flex';
  currentTrip=null;stopPoll();
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('on',b.id==='tab-'+tab));
  if(tab==='trips'){document.getElementById('homeView').style.display='block';renderHome();}
  else if(tab==='links'){document.getElementById('linksView').classList.add('on');renderLinks();}
  else if(tab==='car'){document.getElementById('carView').classList.add('on');renderCar();}
  else if(tab==='dog'){document.getElementById('dogView').classList.add('on');renderDog();}
  window.scrollTo(0,0);
}
function openTrip(id){
  currentTrip=id;
  document.getElementById('homeView').style.display='none';
  document.getElementById('linksView').classList.remove('on');
  document.getElementById('carView').classList.remove('on');
  document.getElementById('dogView').classList.remove('on');
  document.getElementById('tripView').style.display='block';
  document.getElementById('tripView').classList.add('on');
  document.getElementById('backBtn').style.display='inline-flex';
  document.getElementById('topnav').style.display='none';
  renderTrip(id);startPoll(id);window.scrollTo(0,0);
}
function goHome(){
  currentTrip=null;stopPoll();
  document.getElementById('tripView').style.display='none';
  document.getElementById('tripView').classList.remove('on');
  document.getElementById('backBtn').style.display='none';
  document.getElementById('topnav').style.display='flex';
  switchTab(activeTab);
}
function toggleLang(){
  lang=lang==='en'?'sv':'en';localStorage.setItem('pu-lang',lang);
  document.getElementById('langBtn').textContent=lang==='en'?'SV':'EN';
  document.getElementById('tl-trips').textContent=lang==='sv'?'Resor':'Trips';
  document.getElementById('tl-links').textContent=lang==='sv'?'Länkar':'Links';
  document.getElementById('tl-car').textContent=lang==='sv'?'Bil':'Car';
  document.getElementById('tl-dog').textContent=lang==='sv'?'Hund':'Dog';
  document.getElementById('tl-newuser').textContent=lang==='sv'?'Ny användare':'New user';
  if(currentTrip)renderTrip(currentTrip);else switchTab(activeTab);
}
document.getElementById('logoBtn').onclick=goHome;

// ── POLLING ───────────────────────────────────────────────────────────
function startPoll(tid){
  stopPoll();
  pollTimer=setInterval(async()=>{
    try{
      const[fSt,fPr]=await Promise.all([sGet('trip-'+tid),sGet('profiles')]);
      let ch=false;
      if(fSt&&JSON.stringify(fSt)!==JSON.stringify(tripStates[tid])){tripStates[tid]=fSt;ch=true;}
      if(fPr&&JSON.stringify(fPr)!==JSON.stringify(allProfiles)){allProfiles=fPr;ch=true;}
      for(const pr of allProfiles){
        if(myProfile&&pr.id===myProfile.id)continue;
        const fresh=await sGet('checked-'+tid+'-'+pr.id);
        const ck='_u'+pr.id+'_'+tid;
        if(fresh&&JSON.stringify(fresh)!==JSON.stringify(userChecked[ck])){userChecked[ck]=fresh;ch=true;}
      }
      if(ch&&currentTrip===tid)renderTrip(tid);
    }catch(e){console.warn('[pU] poll',e.message);}
  },4000);
}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

// ── INIT ──────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('langBtn').textContent=lang==='en'?'SV':'EN';
  document.getElementById('tl-trips').textContent=lang==='sv'?'Resor':'Trips';
  document.getElementById('tl-links').textContent=lang==='sv'?'Länkar':'Links';
  document.getElementById('tl-car').textContent=lang==='sv'?'Bil':'Car';
  document.getElementById('tl-dog').textContent=lang==='sv'?'Hund':'Dog';
  document.getElementById('tl-newuser').textContent=lang==='sv'?'Ny användare':'New user';
  syncDot('busy');
  const saved=localStorage.getItem('pu-me');
  if(saved)try{myProfile=JSON.parse(saved);myProfile.color=colorFromName(myProfile.name);}catch(e){}
  const[shPr,...trs]=await Promise.all([sGet('profiles'),...IDS.map(id=>sGet('trip-'+id))]);
  allProfiles=shPr||[];
  IDS.forEach((id,i)=>{tripStates[id]=trs[i]||defState(id);if(!tripStates[id].customItems)tripStates[id].customItems=[];});
  if(myProfile){
    const idx=allProfiles.findIndex(p=>p.id===myProfile.id);
    if(idx>=0)allProfiles[idx]={...myProfile};else allProfiles.push({...myProfile});
    await sSet('profiles',allProfiles);
    for(const id of IDS){const ch=await sGet('checked-'+id+'-'+myProfile.id);userChecked[id]=ch||[];userChecked['_u'+myProfile.id+'_'+id]=ch||[];}
    for(const pr of allProfiles){if(pr.id===myProfile.id)continue;for(const id of IDS){const ch=await sGet('checked-'+id+'-'+pr.id);userChecked['_u'+pr.id+'_'+id]=ch||[];}}
  }
  syncDot('ok');
  document.getElementById('loading').style.display='none';
  updateProfBtn();
  document.getElementById('homeView').style.display='block';
  if(!myProfile){showProfileModal(false);}
  else{switchTab('trips');}
}
init();
